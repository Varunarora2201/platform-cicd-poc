name: Build Dotnet Application
description: Restore and build the .NET project

runs:
  using: composite
  steps:

    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 7.0.x

    - name: Restore Dependencies
      run: dotnet restore src/hello-world-api
      shell: bash

    - name: Build Application
      run: dotnet build src/hello-world-api
      shell: bash