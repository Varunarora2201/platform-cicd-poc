name: Unit Test Stage
description: Execute .NET unit tests (POC stage)

runs:
  using: composite
  steps:

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 7.0.x
        
    - name: Download Build Artifact
      uses: actions/download-artifact@v4
      with:
        name: dotnet-build-artifact
        path: build

    - name: Run Unit Tests (POC)
      run: |
        echo "Running unit test stage for POC..."
        dotnet test src/hello-world-api || echo "No tests found - continuing for POC"
      shell: bash