name: Build Dotnet Application
description: Restore and build the .NET project

runs:
  using: composite
  steps:

    - name: Setup Dotnet
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 7.0.x

    - name: Restore Dependencies
      run: dotnet restore src/hello-world-api
      shell: bash

    - name: Build Application
      run: dotnet build src/hello-world-api --no-restore
      shell: bash

    - name: Publish Artifact
      run: dotnet publish src/hello-world-api -c Release -o publish
      shell: bash

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: dotnet-build-artifact
        path: publish