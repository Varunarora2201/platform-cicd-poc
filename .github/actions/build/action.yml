name: Build Artifact
runs:
  using: composite
  steps:
      - uses: actions/checkout@v4

      - name: Setup Dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 7.0.x

      - name: Restore Dependencies
        run: dotnet restore src/hello-world-api

      - name: Build Application
        run: dotnet build src/hello-world-api --no-restore