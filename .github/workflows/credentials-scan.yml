name: credentials scanning

on:
  workflow_call:

jobs:
  credential-scan:
    name: Credentials scanning
    needs: checkout
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Secret Scan (TruffleHog)
        uses: trufflesecurity/trufflehog@main
        with:
          path: .
