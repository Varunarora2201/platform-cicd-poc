name: Build Dotnet

on:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Dotnet
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 7.0.x

    - name: Restore dependencies
      run: dotnet restore src/HelloWorldApi

    - name: Build
      run: dotnet build src/HelloWorldApi --no-restore

    - name: Publish artifact
      run: dotnet publish src/HelloWorldApi -c Release -o publish

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: build-artifact
        path: publish