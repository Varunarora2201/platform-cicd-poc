name: Container Scan

on:
  workflow_call:

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:

    - uses: actions/download-artifact@v4
      with:
        name: docker-image

    - name: Load Image
      run: docker load < image.tar

    - name: Scan Image
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: poc-dotnet-app