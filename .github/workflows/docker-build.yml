name: Docker Build

on:
  workflow_call:

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - name: Build Docker Image
      run: docker build -t poc-dotnet-app .

    - name: Save Docker Image
      run: docker save poc-dotnet-app > image.tar

    - uses: actions/upload-artifact@v4
      with:
        name: docker-image
        path: image.tar